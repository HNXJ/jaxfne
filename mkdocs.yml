site_name: jaxfne
site_description: JAX-based TFNE scaffold for multimodal source-to-field/readout workflows
site_url: https://jaxfne.readthedocs.io/

repo_url: https://github.com/HNXJ/jaxfne
repo_name: HNXJ/jaxfne

docs_dir: docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: slate
      primary: orange
      accent: gray

extra_css:
  - _theme_override.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
      smart_dollar: false
      tex_inline_wrap: ["\\(", "\\)"]
      tex_block_wrap: ["\\[", "\\]"]
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Getting started:
      - Welcome: index.md
      - Installation: install.md
      - Quickstart: quickstart.md
      - FAQ: faq.md

  - Tutorials:
      - Atlas Overview: tutorials/index.md
      - Notebook Standard: tutorials/notebook_standard.md
      - Suite No. 1 (Computational Biophysics): tutorials/06_jaxfne_suite_no_1_computational_biophysics.md
      - Suite No. 2 (Corticospectrolaminar Motif): tutorials/07_jaxfne_suite_no_2_spectrolaminar_motif.md
      - Suite No. 3 (Low-Frequency Scaling): tutorials/08_jaxfne_suite_no_3_low_frequency_scaling.md
      - "01: Single-neuron Multimodal": tutorials/01_single_neuron_multimodal.md
      - "02: Two-neuron E/I": tutorials/02_two_neuron_ei.md
      - "03: 100-neuron Network": tutorials/03_network_100_ei.md
      - "04: V1 Six-layer Column": tutorials/04_v1_column.md
      - "05: V1-PFC Dual Column": tutorials/05_v1_pfc_dual_column.md
      - "06: v0.3.6 Chainable Config": tutorials/06_v036_100_neuron_ei_population.md
      - "07: v0.3.7 Source Bookkeeping": tutorials/07_v037_source_bookkeeping.md
      - "08: v0.3.8 LFP/CSD Readout": tutorials/08_v038_lfp_csd_like_readout.md


  - Guides:
      - Overview: guides/index.md
      - Probe Operators: guides/probe_operators.md
      - Tensor-Field Workflows: guides/tensor_field_workflows.md
      - Plotly Visualization: guides/plotly_visualization.md
      - Poisson Admissibility: guides/poisson_admissibility.md
      - Jaxley Interoperability: guides/jaxley_interop.md
      - Calibration: guides/calibration.md
      - Output Bundles: guides/output_bundles.md

  - API reference:
      - Overview: api/index.md
      - Core: api/core.md
      - Runtime: api/runtime.md
      - Emitters: api/emitters.md
      - Fields: api/fields.md
      - Probes: api/probes.md
      - Objectives: api/objectives.md
      - Validation: api/validation.md

  - About jaxfne:
      - Scope and limitations: scope_and_limitations.md
      - Changelog: changelog.md
      - Citation: citation.md
      - Contributing: contributing.md
      - Releases:
          - v0.3.4: releases/v0.3.4.md
          - v0.2.18: releases/v0.2.18.md
          - v0.2.10: releases/v0.2.10.md
          - v0.2.3: releases/v0.2.3.md
          - v0.2.1: releases/v0.2.1.md
          - v0.2.0: releases/v0.2.0.md

extra:
  jaxfne_version: "0.3.5"
